{% extends "base.html" %} {% block title %}Novo Empréstimo{% endblock %} {%
block content %}

<div class="page-container">
  <form
    class="form-usuario"
    method="POST"
    action="{{ url_for('cadastrar_emprestimo') }}"
  >
    <div class="page-header">
      <h1>Novo Empréstimo</h1>

      <div class="header-buttons">
        <a href="{{ url_for('listagem_emprestimos') }}" class="btn dark">
          Cancelar
        </a>

        <button type="submit" class="btn medium">Salvar</button>
      </div>
    </div>

    <div class="section-title">
      <h2>Dados do Livro</h2>
      <div class="section-line"></div>
    </div>

    <div class="form-row">
      <div class="form-group large">
        <label>Título</label>
        <input type="text" name="titulo" required />
      </div>

      <div class="form-group large">
        <label>Autor</label>
        <input type="text" name="autor" required />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group small">
        <label>Edição</label>
        <input type="text" name="edicao" />
      </div>

      <div class="form-group large">
        <label>Editora</label>
        <input type="text" name="editora" />
      </div>

      <div class="form-group medium">
        <label>Local</label>
        <input type="text" name="local" />
      </div>

      <div class="form-group medium">
        <label>Origem</label>
        <input type="text" name="origem" />
      </div>

      <div class="form-group small">
        <label>Ano</label>
        <input type="number" name="ano" min="0" />
      </div>
    </div>

    <div class="form-group textarea-group">
      <label>Observação</label>
      <textarea name="observacao"></textarea>
    </div>

    <div class="form-group prazo-group">
      <label>Definir Prazo Devolução</label>
      <input type="date" name="prazo" required />
    </div>
  </form>
</div>

{% endblock %}
