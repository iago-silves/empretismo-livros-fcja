{% extends "base.html" %} {% block title %}Cadastro de Administrador{% endblock
%} {% block content %}

<div class="page-container">
  <form id="formCadastroAdmin" class="form-admin">
    <div class="page-header">
      <h1>Cadastro de Administrador</h1>

      <div class="header-buttons">
        <button
          type="button"
          class="btn dark"
          onclick="window.location.href = '/login.html'"
        >
          Cancelar
        </button>

        <button type="submit" class="btn medium">Salvar</button>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group large">
        <label>Nome</label>
        <input type="text" name="nome" required />
      </div>

      <div class="form-group large">
        <label>Email</label>
        <input type="email" name="email" required />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group large">
        <label>Senha</label>
        <input type="password" name="senha" required />
      </div>
    </div>
  </form>
</div>

<script src="{{ url_for('static', filename='js/admin.js') }}"></script>

{% endblock %}
