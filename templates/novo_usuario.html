{% extends "base.html" %} {% block title %}Novo Usuário{% endblock %} {% block
content %}

<div class="page-container">
  <form class="form-usuario" id="formUsuario">
    <div class="page-header">
      <h1>Novo Usuário</h1>

      <div class="header-buttons">
        <button
          type="button"
          class="btn dark"
          onclick="window.location.href = '/usuarios/pagina'"
        >
          Cancelar
        </button>

        <button type="submit" class="btn medium">Salvar</button>
      </div>
    </div>

    <div class="section-title">
      <h2>Dados Pessoais</h2>
      <div class="section-line"></div>
    </div>

    <div class="form-row">
      <div class="form-group large">
        <label>Nome Completo</label>
        <input type="text" name="nome" required />
      </div>

      <div class="form-group large">
        <label>E-mail</label>
        <input type="email" name="email" required />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Telefone</label>
        <input type="text" name="telefone" />
      </div>

      <div class="form-group">
        <label>Endereço</label>
        <input type="text" name="endereco" />
      </div>

      <div class="form-group small">
        <label>Tipo</label>
        <input type="text" name="tipo" />
      </div>

      <div class="form-group small">
        <label>Setor</label>
        <input type="text" name="setor" />
      </div>
    </div>
  </form>
</div>

<!-- Importa o JS da API -->
<script src="{{ url_for('static', filename='js/usuarios.js') }}"></script>

{% endblock %}
