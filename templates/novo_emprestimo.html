{% extends "base.html" %} {% block title %}Novo Empréstimo{% endblock %} {%
block content %}

<div class="page-container">
  <form id="formEmprestimo" class="form-emprestimo">
    <div class="page-header">
      <h1>Novo Empréstimo</h1>

      <div class="header-buttons">
        <button
          type="button"
          class="btn dark"
          onclick="window.location.href = '/usuarios'"
        >
          Cancelar
        </button>

        <button type="submit" class="btn medium">Emprestar</button>
      </div>
    </div>

    <!-- USUÁRIO -->
    <div class="form-group large">
      <label>Usuário</label>
      <select name="usuario_id" id="selectUsuario" required>
        <option value="">Carregando usuários...</option>
      </select>
    </div>

    <!-- DADOS DO LIVRO -->
    <div class="form-row">
      <div class="form-group large">
        <label>Título</label>
        <input type="text" name="titulo" required />
      </div>

      <div class="form-group large">
        <label>Autor</label>
        <input type="text" name="autor" required />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Editora</label>
        <input type="text" name="editora" required />
      </div>

      <div class="form-group">
        <label>Edição</label>
        <input type="text" name="edicao" required />
      </div>

      <div class="form-group">
        <label>Ano</label>
        <input type="number" name="ano" required />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Local</label>
        <input type="text" name="local" />
      </div>

      <div class="form-group">
        <label>Origem</label>
        <input type="text" name="origem" />
      </div>

      <div class="form-group">
        <label>Prazo (dias)</label>
        <input type="number" name="prazo_dias" value="7" required />
      </div>
    </div>

    <div class="form-group large">
      <label>Observação</label>
      <input type="text" name="observacao" />
    </div>
  </form>
</div>

<script src="{{ url_for('static', filename='js/emprestimos.js') }}"></script>

{% endblock %}
